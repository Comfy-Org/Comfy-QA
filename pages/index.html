<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Comfy QA — Registry</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' }</script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; }
    .badge-pass { background: #22c55e; }
    .badge-fail { background: #ef4444; }
    .badge-running { background: #f59e0b; animation: pulse 2s infinite; }
    .badge-skip { background: #6b7280; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.6; } }
    .card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.3); }
    .card { transition: all 0.15s ease; }
  </style>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen">
  <!-- Header -->
  <header class="border-b border-zinc-800 px-6 py-4">
    <div class="max-w-6xl mx-auto flex items-center justify-between">
      <div>
        <h1 class="text-xl font-bold">Comfy QA</h1>
        <p class="text-sm text-zinc-400">Automated QA video registry for Comfy-Org products</p>
      </div>
      <div class="flex items-center gap-3 text-sm">
        <a href="https://github.com/Comfy-Org/Comfy-QA" class="text-zinc-400 hover:text-white">GitHub</a>
        <a href="https://www.npmjs.com/package/comfy-qa" class="text-zinc-400 hover:text-white">npm</a>
        <!-- Auth -->
        <button id="sign-in-btn" onclick="window.signIn()" class="hidden px-3 py-1.5 rounded bg-zinc-700 hover:bg-zinc-600 text-white font-medium text-sm">Sign In</button>
        <div id="user-dropdown" class="hidden relative">
          <button onclick="window.toggleDropdown()" class="flex items-center gap-2 hover:opacity-80">
            <img id="user-avatar" src="" class="w-8 h-8 rounded-full bg-zinc-700 object-cover" alt="">
            <span id="user-display-name" class="text-sm text-zinc-300 max-w-24 truncate"></span>
            <svg class="w-3.5 h-3.5 text-zinc-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
          </button>
          <div id="dropdown-menu" class="hidden absolute right-0 mt-2 w-56 bg-zinc-800 border border-zinc-700 rounded-lg shadow-xl z-50">
            <div class="px-4 py-3 border-b border-zinc-700">
              <div id="dropdown-name" class="text-sm font-semibold text-white"></div>
              <div id="dropdown-email" class="text-xs text-zinc-400 truncate mt-0.5"></div>
            </div>
            <button onclick="window.signOut()" class="w-full text-left px-4 py-2.5 text-sm text-zinc-300 hover:bg-zinc-700 hover:text-white rounded-b-lg">Sign out</button>
          </div>
        </div>
      </div>
    </div>
  </header>

  <!-- Filters -->
  <div class="border-b border-zinc-800 px-6 py-3">
    <div class="max-w-6xl mx-auto flex items-center gap-4">
      <div class="flex gap-1 flex-wrap">
        <button onclick="filter('all')" class="filter-btn active px-3 py-1 rounded text-sm" data-filter="all">All <span id="fc-all" class="text-xs opacity-60"></span></button>
        <button onclick="filter('qa')" class="filter-btn px-3 py-1 rounded text-sm" data-filter="qa">QA Runs <span id="fc-qa" class="text-xs opacity-60"></span></button>
        <button onclick="filter('demo')" class="filter-btn px-3 py-1 rounded text-sm" data-filter="demo">Demos <span id="fc-demo" class="text-xs opacity-60"></span></button>
        <button onclick="filter('reproduced')" class="filter-btn px-3 py-1 rounded text-sm" data-filter="reproduced">Reproduced <span id="fc-reproduced" class="text-xs opacity-60"></span></button>
        <button onclick="filter('not-repro')" class="filter-btn px-3 py-1 rounded text-sm" data-filter="not-repro">Not Repro <span id="fc-not-repro" class="text-xs opacity-60"></span></button>
        <button onclick="filter('inconclusive')" class="filter-btn px-3 py-1 rounded text-sm" data-filter="inconclusive">Inconclusive <span id="fc-inconclusive" class="text-xs opacity-60"></span></button>
        <span class="text-zinc-700 px-1">|</span>
        <span id="repo-filters" class="flex gap-1"></span>
      </div>
      <input type="text" id="search" placeholder="Search by issue #, repo, or product..."
        class="flex-1 bg-zinc-900 border border-zinc-700 rounded px-3 py-1 text-sm focus:outline-none focus:border-zinc-500"
        oninput="renderCards()">
      <span id="count" class="text-sm text-zinc-500"></span>
    </div>
  </div>

  <!-- Stats bar -->
  <div class="border-b border-zinc-800 px-6 py-2">
    <div class="max-w-6xl mx-auto flex gap-6 text-sm text-zinc-400">
      <span id="stat-total">Loading...</span>
      <span id="stat-pass" class="text-green-400"></span>
      <span id="stat-fail" class="text-red-400"></span>
      <span id="stat-running" class="text-yellow-400"></span>
    </div>
  </div>

  <!-- Cards grid -->
  <main class="px-6 py-6">
    <div id="grid" class="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
      <div class="col-span-full text-center text-zinc-500 py-12">Loading QA runs...</div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="border-t border-zinc-800 px-6 py-4 text-center text-sm text-zinc-500">
    Powered by <a href="https://github.com/Comfy-Org/Comfy-QA" class="text-zinc-400 hover:text-white">Comfy-QA</a>
    — Data from GitHub API (no database)
  </footer>

  <script>
    const REPO = "Comfy-Org/Comfy-QA";
    const PAGES_DOMAIN = "comfy-qa.pages.dev";

    let allRuns = [];
    let currentFilter = "all";

    // Load runs from pre-built runs.json (built by scripts/build-index.sh in CI)
    // Falls back to GitHub API if runs.json is empty or missing.
    async function fetchRunsFromIndex() {
      try {
        const resp = await fetch("runs.json", { signal: AbortSignal.timeout(5000) });
        if (resp.ok) {
          const runs = await resp.json();
          if (runs.length > 0) return runs;
        }
      } catch {}
      return null;
    }

    // Fallback: fetch branches from GitHub API (rate-limited, 60/hr unauthenticated)
    async function fetchRunsFromGitHub() {
      const resp = await fetch(`https://api.github.com/repos/${REPO}/branches?per_page=100`);
      if (!resp.ok) return [];
      const branches = (await resp.json()).map(b => b.name);
      return branches.filter(b => /^(sno-)?(qa|demo)-/.test(b)).map(parseBranchName);
    }

    function parseBranchName(branch) {
      // Pattern: qa-{repo}-{number} or sno-qa-{number}
      const qaMatch = branch.match(/^(?:sno-)?qa-(?:(.+?)-)?(\d+)$/);
      if (qaMatch) return { type: "qa", repo: qaMatch[1] || "unknown", number: qaMatch[2], status: "unknown", branch };

      // Pattern: demo-{repo}-{product} or sno-demo-{product}
      const demoMatch = branch.match(/^(?:sno-)?demo-(?:(.+?)-)?(.+)$/);
      if (demoMatch) return { type: "demo", repo: demoMatch[1] || "comfy-qa", product: demoMatch[2], status: "unknown", branch };

      return { type: "other", branch, status: "unknown" };
    }

    // Also fetch running GitHub Actions workflows
    async function fetchRunningWorkflows() {
      try {
        const resp = await fetch(`https://api.github.com/repos/${REPO}/actions/runs?status=in_progress&per_page=10`);
        if (!resp.ok) return [];
        const data = await resp.json();
        return (data.workflow_runs || []).map(r => ({
          type: "running",
          status: "running",
          title: r.display_title,
          branch: r.head_branch,
          url: r.html_url,
          started: r.run_started_at,
        }));
      } catch { return []; }
    }

    function formatDuration(startISO) {
      if (!startISO) return "";
      const ms = Date.now() - new Date(startISO).getTime();
      const sec = Math.floor(ms / 1000);
      if (sec < 60) return `${sec}s`;
      const min = Math.floor(sec / 60);
      if (min < 60) return `${min}m ${sec % 60}s`;
      const hr = Math.floor(min / 60);
      return `${hr}h ${min % 60}m`;
    }

    function statusBadge(run) {
      // Use original badge.svg if available (shows detailed reproduced/not-repro/inconclusive)
      if (run.badge_url) {
        return `<img src="${run.badge_url}" alt="${run.status}" class="h-5" loading="lazy">`;
      }
      const status = run.status || "unknown";
      const cls = { pass: "badge-pass", reproduced: "badge-pass", fail: "badge-fail", "not-repro": "badge-fail", inconclusive: "badge-skip", running: "badge-running", skip: "badge-skip", unknown: "badge-skip" }[status] || "badge-skip";
      const label = { pass: "PASS", reproduced: "REPRODUCED", fail: "FAIL", "not-repro": "NOT REPRO", inconclusive: "INCONCLUSIVE", running: "RUNNING", skip: "SKIP", unknown: "?" }[status] || status.toUpperCase();

      if (status === "running") {
        const started = run.started || run.date || "";
        const dur = formatDuration(started);
        const startedStr = started ? new Date(started).toLocaleTimeString() : "";
        const tooltip = [startedStr && `Started: ${startedStr}`, dur && `Elapsed: ${dur}`].filter(Boolean).join("\\n");
        return `<span class="${cls} px-2 py-0.5 rounded text-xs font-bold text-white cursor-help" title="${tooltip}" data-started="${started}">${label} ${dur ? `(${dur})` : ""}</span>`;
      }

      return `<span class="${cls} px-2 py-0.5 rounded text-xs font-bold text-white">${label}</span>`;
    }

    function issueUrl(run) {
      if (run.sourceUrl) return run.sourceUrl;
      // Construct from repo + number. repo may be "sno-qa", "ComfyUI_frontend", etc.
      const repo = run.githubRepo || (run.repo && !run.repo.startsWith("sno") ? `Comfy-Org/${run.repo}` : "");
      if (repo && run.number) return `https://github.com/${repo}/issues/${run.number}`;
      return "";
    }

    function renderCard(run) {
      // CF Pages may truncate long branch names in subdomains — prefer url from results.json
      const pageUrl = run.url || `https://${run.branch}.${PAGES_DOMAIN}/`;
      const title = run.title || run.product || `#${run.number}` || run.branch;
      const subtitle = run.repo || run.type || "";
      const date = run.date || run.started || "";
      const dateStr = date ? new Date(date).toLocaleDateString() : "";
      const hasVideo = run.hasVideo !== false;
      const ghUrl = issueUrl(run);

      return `
        <div class="card bg-zinc-900 border border-zinc-800 rounded-lg p-4 hover:border-zinc-600">
          <a href="${pageUrl}" target="_blank" class="block">
            <div class="flex items-start justify-between mb-2">
              <div class="font-medium text-sm">${title}</div>
              ${statusBadge(run)}
            </div>
            <div class="text-xs text-zinc-500 mb-3">${subtitle} ${dateStr}</div>
            ${hasVideo ? `
              <div class="bg-zinc-800 rounded aspect-video flex items-center justify-center text-zinc-600 text-xs mb-2 overflow-hidden relative group/video">
                <img
                  class="w-full h-full object-cover absolute inset-0 group-hover/video:opacity-0 transition-opacity"
                  src="${pageUrl}thumbnail.jpg"
                  alt=""
                  loading="lazy"
                  onerror="this.style.display='none'"
                >
                <video
                  class="w-full h-full object-cover absolute inset-0 opacity-0 group-hover/video:opacity-100 transition-opacity"
                  src="${pageUrl}video.mp4"
                  muted loop playsinline preload="none"
                  onmouseenter="this.play().catch(()=>{})"
                  onmouseleave="this.pause();this.currentTime=0"
                ></video>
                <div class="absolute inset-0 flex items-center justify-center bg-black/40 group-hover/video:opacity-0 transition-opacity pointer-events-none">
                  <svg class="w-10 h-10 text-white/80" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                </div>
              </div>
            ` : ''}
          </a>
          <div class="flex items-center justify-between mt-1">
            <div class="text-xs text-zinc-600 font-mono">${run.branch}</div>
            ${ghUrl ? `<a href="${ghUrl}" target="_blank" class="text-xs text-zinc-500 hover:text-blue-400 flex items-center gap-1" onclick="event.stopPropagation()">
              <svg class="w-3.5 h-3.5" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
              #${run.number}
            </a>` : ''}
          </div>
        </div>
      `;
    }

    function renderCards() {
      const search = document.getElementById("search").value.toLowerCase();
      const filtered = allRuns.filter(r => {
        if (currentFilter === "qa" && r.type !== "qa" && r.type !== "running") return false;
        if (currentFilter === "demo" && r.type !== "demo") return false;
        if (currentFilter === "reproduced" && r.status !== "reproduced" && r.status !== "pass") return false;
        if (currentFilter === "not-repro" && r.status !== "not-repro") return false;
        if (currentFilter === "inconclusive" && r.status !== "inconclusive") return false;
        if (currentFilter.startsWith("repo:") && r.repo !== currentFilter.slice(5)) return false;
        if (search) {
          const text = JSON.stringify(r).toLowerCase();
          return text.includes(search);
        }
        return true;
      });

      const grid = document.getElementById("grid");
      if (filtered.length === 0) {
        grid.innerHTML = `<div class="col-span-full text-center text-zinc-500 py-12">
          ${allRuns.length === 0 ? "No QA runs found yet. Runs will appear here when CI deploys results." : "No results match your filter."}
        </div>`;
      } else {
        grid.innerHTML = filtered.map(renderCard).join("");
      }
      document.getElementById("count").textContent = `${filtered.length} of ${allRuns.length}`;
    }

    function filter(f) {
      currentFilter = f;
      document.querySelectorAll(".filter-btn").forEach(b => {
        b.classList.toggle("bg-zinc-700", b.dataset.filter === f);
        b.classList.toggle("text-white", b.dataset.filter === f);
        b.classList.toggle("active", b.dataset.filter === f);
      });
      renderCards();
    }

    function filterRepo(repo) {
      currentFilter = "repo:" + repo;
      document.querySelectorAll(".filter-btn").forEach(b => {
        b.classList.toggle("bg-zinc-700", b.dataset.filter === currentFilter);
        b.classList.toggle("text-white", b.dataset.filter === currentFilter);
      });
      renderCards();
    }

    async function init() {
      // Try pre-built index first, fall back to GitHub API
      const [indexRuns, running] = await Promise.all([
        fetchRunsFromIndex(),
        fetchRunningWorkflows(),
      ]);

      const metas = indexRuns || await fetchRunsFromGitHub();

      allRuns = [...running, ...metas].sort((a, b) => {
        // Running first, then by date desc
        if (a.status === "running" && b.status !== "running") return -1;
        if (b.status === "running" && a.status !== "running") return 1;
        return (b.date || "") > (a.date || "") ? 1 : -1;
      });

      // Update filter button counts
      const counts = {
        all: allRuns.length,
        qa: allRuns.filter(r => r.type === "qa" || r.type === "running").length,
        demo: allRuns.filter(r => r.type === "demo").length,
        reproduced: allRuns.filter(r => r.status === "reproduced" || r.status === "pass").length,
        "not-repro": allRuns.filter(r => r.status === "not-repro").length,
        inconclusive: allRuns.filter(r => r.status === "inconclusive").length,
      };
      for (const [key, n] of Object.entries(counts)) {
        const el = document.getElementById(`fc-${key}`);
        if (el) el.textContent = n > 0 ? `(${n})` : "";
      }

      // Build repo filter buttons dynamically with counts
      const repos = [...new Set(allRuns.map(r => r.repo).filter(Boolean))];
      const repoCounts = Object.fromEntries(repos.map(repo => [repo, allRuns.filter(r => r.repo === repo).length]));
      document.getElementById("repo-filters").innerHTML = repos.map(repo =>
        `<button onclick="filterRepo('${repo}')" class="filter-btn px-2 py-0.5 rounded text-xs border border-zinc-700 text-zinc-400 hover:text-white" data-filter="repo:${repo}">${repo} <span class="opacity-60">(${repoCounts[repo]})</span></button>`
      ).join("");

      // Stats
      const repro = allRuns.filter(r => r.status === "reproduced" || r.status === "pass").length;
      const notRepro = allRuns.filter(r => r.status === "not-repro").length;
      const inconclusive = allRuns.filter(r => r.status === "inconclusive").length;
      const runningCount = allRuns.filter(r => r.status === "running").length;
      document.getElementById("stat-total").textContent = `${allRuns.length} total runs`;
      document.getElementById("stat-pass").textContent = repro ? `${repro} reproduced` : "";
      document.getElementById("stat-fail").textContent = notRepro ? `${notRepro} not-repro` : "";
      document.getElementById("stat-running").textContent =
        (inconclusive ? `${inconclusive} inconclusive` : "") +
        (runningCount ? ` ${runningCount} running` : "");

      renderCards();

      // Live-update running badge elapsed times every 10s
      if (runningCount > 0) {
        setInterval(() => {
          document.querySelectorAll("[data-started]").forEach(el => {
            const started = el.getAttribute("data-started");
            if (!started) return;
            const dur = formatDuration(started);
            el.textContent = `RUNNING ${dur ? `(${dur})` : ""}`;
            el.title = `Started: ${new Date(started).toLocaleTimeString()}\nElapsed: ${dur}`;
          });
        }, 10_000);
      }
    }

    init();

    // Firebase Auth — same project as registry-web (dreamboothy-dev)
    firebase.initializeApp({
      apiKey: "AIzaSyDa_YMeyzV0SkVe92vBZ1tVikWBmOU5KVE",
      authDomain: "dreamboothy-dev.firebaseapp.com",
      projectId: "dreamboothy-dev",
    });
    const auth = firebase.auth();

    auth.onAuthStateChanged(user => {
      const signInBtn = document.getElementById("sign-in-btn");
      const userDropdown = document.getElementById("user-dropdown");
      if (user) {
        signInBtn.classList.add("hidden");
        userDropdown.classList.remove("hidden");
        const avatar = document.getElementById("user-avatar");
        avatar.src = user.photoURL || "";
        avatar.style.display = user.photoURL ? "" : "none";
        document.getElementById("user-display-name").textContent = user.displayName || user.email || "";
        document.getElementById("dropdown-name").textContent = user.displayName || "";
        document.getElementById("dropdown-email").textContent = user.email || "";
      } else {
        signInBtn.classList.remove("hidden");
        userDropdown.classList.add("hidden");
      }
    });

    window.signIn = async () => {
      try {
        await auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
      } catch (e) {
        console.error("Sign in failed:", e.message);
      }
    };

    window.signOut = async () => {
      await auth.signOut();
      document.getElementById("dropdown-menu").classList.add("hidden");
    };

    window.toggleDropdown = () => {
      document.getElementById("dropdown-menu").classList.toggle("hidden");
    };

    document.addEventListener("click", e => {
      const dropdown = document.getElementById("user-dropdown");
      if (dropdown && !dropdown.contains(e.target)) {
        document.getElementById("dropdown-menu").classList.add("hidden");
      }
    });
  </script>
</body>
</html>
