name: QA on reviewer assignment

on:
  repository_dispatch:
    types: [qa-review-requested]

jobs:
  run-qa:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      REPO: ${{ github.event.client_payload.repo }}
      NUMBER: ${{ github.event.client_payload.number }}
      TITLE: ${{ github.event.client_payload.title }}
      PR_URL: ${{ github.event.client_payload.url }}
      PR_SHA: ${{ github.event.client_payload.sha }}
      PR_BRANCH: ${{ github.event.client_payload.branch }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: oven-sh/setup-bun@v2

      - run: bun install

      - name: Post pending comment
        env:
          GH_TOKEN: ${{ secrets.COMFY_PR_BOT_TOKEN }}
        run: |
          gh pr comment "$PR_URL" \
            --body "⏳ **Comfy QA running** — [live results](https://comfy-qa.pages.dev/?q=$NUMBER)"

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache ComfyUI models
        uses: actions/cache@v4
        with:
          path: ComfyUI/models
          key: comfyui-models-v1

      - name: Install ComfyUI
        run: |
          git clone --depth 1 https://github.com/comfyanonymous/ComfyUI
          cd ComfyUI
          pip install torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt

      - name: Swap in PR frontend branch
        if: contains(env.REPO, 'frontend') || contains(env.REPO, 'ComfyUI_frontend')
        run: |
          cd ComfyUI
          rm -rf web
          git clone --depth 1 --branch "$PR_BRANCH" "https://github.com/$REPO" web

      - name: Start ComfyUI
        run: |
          cd ComfyUI
          python main.py --cpu --listen 0.0.0.0 --port 8188 &
          timeout 90 bash -c 'until curl -sf http://localhost:8188/; do sleep 2; done'
          echo "ComfyUI ready"

      - name: Run cmqa pr
        run: bunx cmqa pr "$PR_URL"
        env:
          COMFYUI_URL: http://localhost:8188
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_API_KEY_QA: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Deploy QA result
        run: |
          VIDEO=$(find .comfy-qa -name '*.mp4' | head -1 || true)
          bash scripts/deploy-qa-result.sh \
            --repo    "$REPO" \
            --number  "$NUMBER" \
            --title   "$TITLE" \
            --status  "pass" \
            ${VIDEO:+--video "$VIDEO"}
        env:
          COMFY_QA_TOKEN: ${{ secrets.COMFY_QA_TOKEN }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Post result comment
        if: always()
        env:
          GH_TOKEN: ${{ secrets.COMFY_PR_BOT_TOKEN }}
        run: |
          BRANCH="qa-$(echo "$REPO" | tr '/' '-')-$NUMBER"
          gh pr comment "$PR_URL" \
            --body "✅ **Comfy QA complete** — https://${BRANCH}.comfy-qa.pages.dev/"
