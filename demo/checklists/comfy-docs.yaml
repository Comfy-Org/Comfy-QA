# QA Checklist: Comfy Docs
product: Comfy Docs
url: https://docs.comfy.org/

persona: >
  A developer learning ComfyUI. First person, present tense, conversational.

features:
  - name: Landing Page
    operations:
      - id: view_hero
        type: read
        description: "Docs homepage with hero and navigation"
        steps_hint: "Observe the main heading and section links"
        narration: "This is the Comfy Docs homepage — the starting point for learning ComfyUI."
        success_criteria: "Page loads with navigation and main content"

      - id: view_sidebar
        type: read
        description: "Navigation sidebar with doc sections"
        steps_hint: "Look at the left sidebar navigation"
        narration: "The sidebar shows all the documentation sections — tutorials, guides, API, and more."
        success_criteria: "Sidebar navigation links are visible"

  - name: Getting Started
    operations:
      - id: view_install_guide
        type: read
        description: "Installation guide"
        steps_hint: "Navigate to https://docs.comfy.org/get_started/introduction"
        narration: "The Getting Started section walks me through installing ComfyUI step by step."
        success_criteria: "Installation instructions or getting started content visible"

  - name: Tutorials
    operations:
      - id: view_tutorials
        type: read
        description: "Tutorials index"
        steps_hint: "Navigate to https://docs.comfy.org/tutorials/basic/"
        narration: "The tutorials section has hands-on examples for common workflows."
        success_criteria: "Tutorial list or tutorial content visible"

  - name: Custom Nodes
    operations:
      - id: view_custom_nodes_docs
        type: read
        description: "Custom nodes documentation"
        steps_hint: "Navigate to https://docs.comfy.org/custom-nodes/overview"
        narration: "If I want to build my own custom nodes, this section explains the API and packaging."
        success_criteria: "Custom nodes documentation visible"
