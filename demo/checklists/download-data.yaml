# QA Checklist: ComfyUI Download Statistics
product: Download Data
url: https://comfyui-download-statistics.vercel.app/

persona: >
  A ComfyUI user or developer checking download trends. First person, present tense.

features:
  - name: Landing Page
    operations:
      - id: view_chart
        type: read
        description: "Main download chart"
        steps_hint: "Observe the download statistics chart"
        narration: "This dashboard shows ComfyUI download trends over time — useful for tracking growth."
        success_criteria: "Chart or graph visible with data"

      - id: view_totals
        type: read
        description: "Total download numbers"
        steps_hint: "Look for total download counters"
        narration: "At a glance, I can see the total downloads across all platforms."
        success_criteria: "Numeric totals visible"

  - name: Time Ranges
    operations:
      - id: view_daily
        type: read
        description: "Daily time range"
        steps_hint: "Click on 'Daily' or 1d time range button"
        narration: "I can zoom into daily downloads to see short-term trends."
        success_criteria: "Daily view selected or daily data visible"

      - id: view_weekly
        type: read
        description: "Weekly time range"
        steps_hint: "Click on 'Weekly' or 7d button"
        narration: "Weekly view smooths out daily noise and shows the broader pattern."
        success_criteria: "Weekly view selected"

      - id: view_monthly
        type: read
        description: "Monthly time range"
        steps_hint: "Click on 'Monthly' or 30d button"
        narration: "Monthly view shows long-term growth trends."
        success_criteria: "Monthly view selected"
