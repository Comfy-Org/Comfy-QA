<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Demo: ComfyUI Download Statistics</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' }</script>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen p-8">
  <div class="max-w-3xl mx-auto">
    <a href="https://comfy-qa.pages.dev/" class="text-zinc-500 text-sm hover:text-white mb-4 block">&larr; Back to registry</a>
    <div class="flex items-center gap-3 mb-4">
      <img src="badge.svg" alt="pass" class="h-5">
      <h1 class="text-2xl font-bold">ComfyUI Download Statistics Dashboard</h1>
    </div>
    <div class="text-sm text-zinc-400 mb-6">comfy-qa &middot; demo &middot; 8 segments &middot; 63% interactive</div>
    <video controls class="w-full rounded-lg mb-6" src="video.mp4"></video>
    <div class="bg-zinc-900 rounded-lg p-4">
      <h2 class="text-sm font-bold mb-2">Results</h2>
      <pre id="results" class="text-xs text-zinc-400 overflow-auto"></pre>
    </div>
  </div>
  <script>
    fetch('results.json').then(r=>r.json()).then(d=>document.getElementById('results').textContent=JSON.stringify(d,null,2));
  </script>
</body>
</html>
